plugins {
    id("com.android.application")
    id("kotlin-android")
    id("kotlin-kapt")
    id("kotlin-parcelize")
}

android {
    compileSdkVersion 33
    buildToolsVersion '33.0.0'

    namespace 'me.sheimi.sgit'
    defaultConfig {
        applicationId "com.manichord.mgit"
        minSdkVersion 26
        targetSdkVersion 33
        versionCode 1
        versionName "1.0.0"

        vectorDrawables.useSupportLibrary = true
    }
	
  	buildFeatures {
        viewBinding true
    }
    
    lintOptions {
        abortOnError false
    }

    signingConfigs {
        if (project.hasProperty('special')) {
            release {
                keyAlias alias
                keyPassword password
                storeFile file(keystore)
                storePassword password
            }
        } else {
            release {
                keyAlias ''
                keyPassword ''
                storeFile file('/empty')
                storePassword ''
            }
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
        }
    }

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8.toString()
    }
}

configurations.all {
    resolutionStrategy.eachDependency { DependencyResolveDetails details ->
        if (details.requested.group == "com.jcraft" && details.requested.name == "jsch") {
            details.useTarget("com.github.mwiede:jsch:0.2.4")
        }
    }
    exclude module: 'httpclient'
}

dependencies {
    def eclipseJgit_version = "6.4.0.202211300538-r"
    def lifecycle_version = "1.1.1"

    // AndroidX
    // https://mvnrepository.com/artifact/androidx.annotation/annotation
    implementation 'androidx.annotation:annotation:1.6.0-rc01'
    // https://mvnrepository.com/artifact/androidx.appcompat/appcompat
    implementation 'androidx.appcompat:appcompat:1.7.0-alpha02'
    // https://mvnrepository.com/artifact/androidx.constraintlayout/constraintlayout
    implementation 'androidx.constraintlayout:constraintlayout:2.2.0-alpha07'
    // https://mvnrepository.com/artifact/androidx.fragment/fragment
    implementation 'androidx.fragment:fragment:1.6.0-alpha05'
    // ViewModel and LiveData
    // https://mvnrepository.com/artifact/androidx.lifecycle/lifecycle-extensions
    implementation 'androidx.lifecycle:lifecycle-extensions:2.2.0'
    // https://mvnrepository.com/artifact/androidx.lifecycle/lifecycle-compiler
    kapt 'androidx.lifecycle:lifecycle-compiler:2.6.0-beta01'
        // https://mvnrepository.com/artifact/androidx.recyclerview/recyclerview
    implementation 'androidx.recyclerview:recyclerview:1.3.0-rc01'
    // https://mvnrepository.com/artifact/androidx.vectordrawable/vectordrawable
    implementation 'androidx.vectordrawable:vectordrawable:1.2.0-beta01'
    // https://mvnrepository.com/artifact/com.google.android.material/material
    implementation 'com.google.android.material:material:1.9.0-alpha02'
    // Kotlin
    // https://mvnrepository.com/artifact/org.jetbrains.kotlin/kotlin-stdlib-jdk8
    implementation 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.20-Beta'
    // Commons-io
    // https://mvnrepository.com/artifact/commons-io/commons-io
    implementation 'commons-io:commons-io:2.11.0'
    // SSH
    // https://mvnrepository.com/artifact/com.github.mwiede/jsch
    implementation 'com.github.mwiede:jsch:0.2.7'
    // https://mvnrepository.com/artifact/org.eclipse.jgit/org.eclipse.jgit
    implementation 'org.eclipse.jgit:org.eclipse.jgit:6.4.0.202211300538-r'
    // https://mvnrepository.com/artifact/org.eclipse.jgit/org.eclipse.jgit.ssh.jsch
    implementation 'org.eclipse.jgit:org.eclipse.jgit.ssh.jsch:6.4.0.202211300538-r'


    implementation 'com.nostra13.universalimageloader:universal-image-loader:1.9.5'
    implementation 'com.jakewharton.timber:timber:4.5.1'
    

    
    
    
    
    

    




  implementation 'com.scottyab:secure-preferences-lib:0.1.4'
}
